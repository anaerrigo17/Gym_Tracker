<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gym Tracker</title>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Gym Tracker"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:#f7f7f7;}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;padding:12px;max-width:680px;margin:0 auto;font-size:15px;}
    button{font-family:inherit;cursor:pointer;}
    input{font-family:inherit;}
    input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
    input[type=number]{-moz-appearance:textfield;}

    /* Week selector */
    .week-bar{display:flex;border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;margin-bottom:0;}
    .week-btn{flex:1;padding:8px 0;font-size:14px;border:none;background:transparent;color:#999;font-weight:400;transition:background .15s,color .15s;}
    .week-btn.active-a{background:#EEEDFE;color:#534AB7;font-weight:600;}
    .week-btn.active-b{background:#E1F5EE;color:#0F6E56;font-weight:600;}

    /* Day selector */
    .day-bar{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;}
    .day-bar::-webkit-scrollbar{display:none;}
    .day-btn{flex-shrink:0;padding:7px 16px;font-size:13px;border:1px solid #e0e0e0;border-radius:10px;background:transparent;color:#999;font-weight:400;white-space:nowrap;}
    .day-btn.active{border-color:#bbb;background:#f0f0f0;color:#111;font-weight:600;}

    /* Card */
    .card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;overflow:hidden;margin-top:14px;}
    .card-title{padding:14px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
    .card-title-text{font-size:17px;font-weight:700;color:#111;}
    .card-subtitle{font-size:13px;color:#999;}
    .tip-bar{padding:11px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;line-height:1.5;}

    /* Floor header */
    .floor-hdr{padding:7px 16px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#5F5E5A;background:#F1EFE8;border-bottom:1px solid #ece9e0;border-top:1px solid #ece9e0;}

    /* Exercise row */
    .ex-row{padding:13px 16px;border-bottom:1px solid #f5f5f5;}
    .ex-name{font-size:15px;font-weight:700;color:#111;margin-bottom:7px;}
    .ex-sets-label{font-size:13px;color:#666;font-weight:500;white-space:nowrap;}

    /* Badges */
    .badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:0;}
    .badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
    .badge-eq{background:#E6F1FB;color:#185FA5;}
    .badge-rest{background:#FAEEDA;color:#854F0B;}
    .badge-muscle{background:#EAF3DE;color:#3B6D11;}

    /* Action links */
    .action-links{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap;}
    .action-link{font-size:13px;color:#4a7fcb;background:none;border:none;padding:0;font-weight:500;}
    .action-link.timer-link{color:#854F0B;}
    .action-link.log-link-active{color:#0F6E56;}

    /* Guide */
    .guide-box{margin-top:10px;background:#f9f9f9;border-radius:10px;padding:11px 13px;}
    .guide-step{display:flex;gap:8px;margin-bottom:5px;font-size:13px;color:#555;line-height:1.5;}
    .guide-step:last-child{margin-bottom:0;}
    .guide-num{font-weight:700;color:#333;min-width:18px;}

    /* Log section */
    .log-section{margin-top:12px;}
    .set-count-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .set-count-label{font-size:13px;color:#666;font-weight:500;}
    .count-btn{width:28px;height:28px;border:1px solid #ddd;border-radius:8px;background:#f5f5f5;font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1;}
    .count-val{font-size:14px;font-weight:700;min-width:18px;text-align:center;color:#111;}

    /* Set rows */
    .set-headers{display:grid;grid-template-columns:52px 1fr 1fr;gap:8px;margin-bottom:5px;}
    .set-header-cell{font-size:11px;color:#bbb;font-weight:500;}
    .set-row{display:grid;grid-template-columns:52px 1fr 1fr;gap:8px;align-items:center;margin-bottom:6px;}
    .set-label{font-size:13px;color:#999;font-weight:500;}
    .set-input{width:100%;font-size:14px;padding:8px 10px;border:1px solid #e0e0e0;border-radius:10px;outline:none;background:#fafafa;color:#111;text-align:center;}
    .set-input:focus{border-color:#534AB7;background:#fff;}

    /* Buttons */
    .btn-primary{display:inline-block;padding:9px 18px;font-size:14px;font-weight:600;border-radius:10px;border:1px solid;cursor:pointer;margin-top:10px;}
    .btn-secondary{display:inline-block;padding:9px 18px;font-size:14px;font-weight:500;border-radius:10px;border:1px solid #ddd;background:#f5f5f5;color:#555;cursor:pointer;margin-top:10px;}

    /* History */
    .history-section{margin-top:14px;}
    .history-title{font-size:12px;font-weight:700;color:#333;margin-bottom:7px;}
    .history-card{margin-bottom:8px;padding:9px 11px;background:#f9f9f9;border-radius:10px;border:1px solid #eee;}
    .history-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
    .history-date{font-size:12px;font-weight:700;color:#555;}
    .history-edit{font-size:12px;color:#4a7fcb;background:none;border:none;padding:0;font-weight:500;}
    .history-set{display:flex;gap:12px;font-size:12px;color:#666;padding:2px 0;}
    .history-set-label{color:#bbb;min-width:42px;}

    /* Warmup */
    .warmup-toggle{width:100%;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;background:#FFF8F0;border:none;border-bottom:1px solid #f0f0f0;}
    .warmup-title{font-size:14px;font-weight:700;color:#A0522D;}
    .warmup-arrow{font-size:13px;color:#A0522D;font-weight:500;}
    .warmup-list{padding:4px 16px 12px;}
    .warmup-item{padding:8px 0;border-bottom:1px solid #f5f5f5;}
    .warmup-item:last-child{border-bottom:none;}
    .warmup-item-hdr{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:3px;}
    .warmup-item-name{font-size:14px;font-weight:600;color:#111;}
    .warmup-item-dur{font-size:11px;color:#A0522D;background:#FFF8F0;padding:2px 8px;border-radius:20px;white-space:nowrap;font-weight:500;}
    .warmup-item-cue{font-size:12px;color:#777;line-height:1.5;}

    /* Timer overlay */
    .timer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:1000;}
    .timer-card{background:#fff;border-radius:22px;padding:30px 36px;min-width:240px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.18);}
    .timer-label{font-size:12px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:18px;}
    .timer-svg{margin-bottom:10px;}
    .timer-remaining{font-size:12px;color:#bbb;margin-bottom:22px;}
    .timer-btns{display:flex;gap:10px;justify-content:center;}
    .timer-btn-secondary{padding:8px 20px;font-size:14px;border-radius:10px;border:1px solid #ddd;background:#f5f5f5;color:#555;font-weight:500;}
    .timer-btn-primary{padding:8px 20px;font-size:14px;border-radius:10px;border:1px solid;font-weight:700;}

    /* Selectors row */
    .selectors{display:flex;flex-direction:column;gap:10px;margin-bottom:0;}
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ── Tiny reactive runtime ───────────────────────────────────────────────────
const _S=[],_E=[];let _idx=0,_dirty=false,_rootFn,_rootEl;
function useState(init){
  const i=_idx++;
  if(_S[i]===undefined)_S[i]=typeof init==='function'?init():init;
  return[_S[i],v=>{_S[i]=typeof v==='function'?v(_S[i]):v;_schedule();}];
}
function useEffect(fn,deps){
  const i=_idx++;const prev=_E[i];
  const changed=!prev||!deps||deps.some((d,j)=>d!==prev.deps[j]);
  if(changed){if(prev?.cleanup)prev.cleanup();_E[i]={deps,cleanup:null};setTimeout(()=>{const c=fn();if(typeof c==='function')_E[i].cleanup=c;},0);}
}
function useRef(init){const i=_idx++;if(_S[i]===undefined)_S[i]={current:init};return _S[i];}
function _schedule(){if(_dirty)return;_dirty=true;setTimeout(()=>{_dirty=false;_idx=0;_patch(_rootEl,_rootFn());},0);}
function mount(fn,el){_rootFn=fn;_rootEl=el;_idx=0;_patch(el,fn());}

// ── VDOM ───────────────────────────────────────────────────────────────────
function h(tag,props,...kids){return{tag,props:props||{},kids:kids.flat(99).filter(k=>k!=null&&k!==false)};}
function _patch(el,vdom){el.innerHTML='';(Array.isArray(vdom)?vdom:[vdom]).forEach(v=>el.appendChild(_create(v)));}
function _create(v){
  if(v==null||v===false)return document.createTextNode('');
  if(typeof v==='string'||typeof v==='number')return document.createTextNode(String(v));
  const el=document.createElement(v.tag);
  Object.entries(v.props||{}).forEach(([k,val])=>{
    if(k==='style'&&typeof val==='object')Object.assign(el.style,val);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),val);
    else if(k==='className')el.className=val;
    else if((k==='value'||k==='checked')&&(el.tagName==='INPUT'||el.tagName==='TEXTAREA')){el[k]=val??'';}
    else if(k==='placeholder')el.placeholder=val;
    else if(k==='type')el.type=val;
    else if(k==='disabled')el.disabled=!!val;
    else{try{el.setAttribute(k,val);}catch(e){}}
  });
  v.kids.forEach(k=>el.appendChild(_create(k)));
  return el;
}

// ── Data ───────────────────────────────────────────────────────────────────
const WARMUPS=[

      ]},
    ]},

  {label:"Thu",title:"Lower body — glute & hamstring focus",tip:"Hip hinge is key today. Think: push hips back, not bend knees. Squeeze hard at top of every hip thrust.",

        {name:"Dumbbell step-up to press",sets:"3 × 10/leg",rest:"45 s",restSecs:45,muscles:"Quads, glutes, shoulders",eq:"DB + bench",guide:["One foot on bench. Drive up through that heel.","At the top, press both DBs overhead.","Lower DBs as you step back down."]},

        {name:"Lat pulldown — light, fast",sets:"3 × 20",rest:"20 s",restSecs:20,muscles:"Lats, biceps",eq:"Cable machine",guide:["About 50% of your normal weight. Pull fast but controlled.","20 reps, then rest only 20 seconds.","This is a metabolic finisher — embrace the burn."]},
        {name:"Leg press — light, fast",sets:"3 × 20",rest:"45 s",restSecs:45,muscles:"Quads, glutes",eq:"Machine",guide:["Light weight, 20 reps, explosive push, slow lower.","Try a slightly different foot position than Week A."]},

const SK="gym_log_v3";
function psc(s){const m=s.match(/^(\d+)/);return m?parseInt(m[1]):3;}
function lk(w,d,f,e){return w+"_"+d+"_"+f+"_"+e;}
function er(n){return Array.from({length:n},()=>({weight:"",reps:""}));}
function loadLog(){try{const r=localStorage.getItem(SK);return r?JSON.parse(r):{}}catch{return{};}}
function saveLog(l){try{localStorage.setItem(SK,JSON.stringify(l));}catch{}}

// ── Timer ──────────────────────────────────────────────────────────────────
function Timer({seconds,onClose}){
  const [rem,setRem]=useState(seconds);
  const [running,setRunning]=useState(true);
  const ref=useRef(null);
  useEffect(()=>{
    if(running){ref.current=setInterval(()=>setRem(r=>{if(r<=1){clearInterval(ref.current);setRunning(false);return 0;}return r-1;}),1000);}
    else clearInterval(ref.current);
    return()=>clearInterval(ref.current);
  },[running]);
  const done=rem===0;
  const pct=rem/seconds;
  const R=34,circ=2*Math.PI*R;
  const stroke=done?"#0F6E56":"#534AB7";
  return h("div",{className:"timer-overlay",onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    h("div",{className:"timer-card"},
      h("div",{className:"timer-label"},[done?"✅ Rest complete!":"Rest timer"]),
      h("div",{className:"timer-svg"},
        h("svg",{width:96,height:96,viewBox:"0 0 96 96",style:{transform:"rotate(-90deg)"}},
          h("circle",{cx:48,cy:48,r:R,fill:"none",stroke:"#f0f0f0","stroke-width":7}),
          h("circle",{cx:48,cy:48,r:R,fill:"none",stroke,
            "stroke-width":7,"stroke-dasharray":circ,
            "stroke-dashoffset":circ*(1-pct),"stroke-linecap":"round",
            style:{transition:"stroke-dashoffset 0.9s linear,stroke 0.3s"}}),
          h("text",{x:48,y:48,fill:done?"#0F6E56":"#111","text-anchor":"middle","dominant-baseline":"central",
            style:{transform:"rotate(90deg) translate(0,-96px)",fontSize:"22px",fontWeight:"700",fontFamily:"inherit"}},[String(rem)])
        )
      ),
      h("div",{className:"timer-remaining"},["seconds remaining"]),
      h("div",{className:"timer-btns"},[
        !done&&h("button",{className:"timer-btn-secondary",onClick:()=>setRunning(r=>!r)},[running?"Pause":"Resume"]),
        h("button",{className:"timer-btn-primary",
          style:{background:done?"#E1F5EE":"#EEEDFE",borderColor:done?"#5DCAA5":"#AFA9EC",color:done?"#0F6E56":"#534AB7"},
          onClick:onClose},[done?"Done":"Skip"]),
      ])
    )
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const [week,setWeek]=useState("A");
  const [dayIdx,setDayIdx]=useState(0);
  const [warmupOpen,setWarmupOpen]=useState(false);
  const [guides,setGuides]=useState({});
  const [logs,setLogs]=useState({});
  const [log,setLog]=useState(loadLog);
  const [draft,setDraft]=useState({});
  const [editSess,setEditSess]=useState({});
  const [timer,setTimer]=useState(null);

  useEffect(()=>{saveLog(log);},[log]);

  const day=DAYS[dayIdx],plan=day[week],warmup=WARMUPS[dayIdx];
  const wc=week==="A"?{bg:"#EEEDFE",text:"#534AB7",border:"#AFA9EC"}:{bg:"#E1F5EE",text:"#0F6E56",border:"#5DCAA5"};

  function tg(k){setGuides(p=>({...p,[k]:!p[k]}));}
  function tl(k,ex){
    const o=!logs[k];setLogs(p=>({...p,[k]:o}));
    if(o&&!draft[k]){const n=psc(ex.sets);setDraft(p=>({...p,[k]:{sets:er(n),customCount:n}}));}
  }
  function uds(k,si,f,v){setDraft(p=>{const d=p[k]||{sets:[],customCount:0};return{...p,[k]:{...d,sets:d.sets.map((s,i)=>i===si?{...s,[f]:v}:s)}};});}
  function csc(k,delta,ex){setDraft(p=>{
    const d=p[k]||{sets:er(psc(ex.sets)),customCount:psc(ex.sets)};
    const n=Math.max(1,(d.customCount||d.sets.length)+delta);
    let sets=[...d.sets];
    if(n>sets.length)while(sets.length<n)sets.push({weight:"",reps:""});else sets=sets.slice(0,n);
    return{...p,[k]:{...d,sets,customCount:n}};
  });}
  function submit(k,restSecs){
    const d=draft[k];if(!d||!d.sets.some(s=>s.weight||s.reps))return;
    const entry={date:new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short"}),sets:d.sets.map(s=>({weight:s.weight,reps:s.reps})),notes:d.notes||""};
    setLog(prev=>{const u=[entry,...(prev[k]||[])].slice(0,5);return{...prev,[k]:u};});
    setDraft(p=>({...p,[k]:{...d,sets:er(d.customCount||d.sets.length)}}));
    setTimer({seconds:restSecs});
  }
  function startEdit(k,si,session){
    setEditSess(p=>({...p,[k]:si}));
    setDraft(p=>({...p,[k]:{sets:session.sets.map(s=>({weight:s.weight||"",reps:s.reps||""})),customCount:session.sets.length}}));
  }
  function saveEdit(k,si){
    const d=draft[k];if(!d)return;
    setLog(prev=>{const arr=[...(prev[k]||[])];arr[si]={...arr[si],sets:d.sets.map(s=>({weight:s.weight,reps:s.reps}))};return{...prev,[k]:arr};});
    setEditSess(p=>({...p,[k]:null}));
    setDraft(p=>({...p,[k]:{sets:er(d.customCount),customCount:d.customCount}}));
  }
  function cancelEdit(k,ex){
    setEditSess(p=>({...p,[k]:null}));
    const n=psc(ex.sets);setDraft(p=>({...p,[k]:{sets:er(n),customCount:n}}));
  }

  function exRow(ex,fi,ei){
    const k=lk(week,dayIdx,fi,ei);
    const guideOpen=guides[k],logOpen=logs[k];
    const history=log[k]||[];
    const d=draft[k]||{sets:er(psc(ex.sets)),customCount:psc(ex.sets)};
    const editIdx=editSess[k]??null,isEditing=editIdx!==null;

    return h("div",{className:"ex-row"},
      // Header
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}},
        h("div",{style:{flex:1}},
          h("div",{className:"ex-name"},[ex.name]),
          h("div",{style:{display:"flex",flexDirection:"column",gap:5}},
            h("div",{className:"badges"},[
              h("span",{className:"badge badge-muscle"},[ex.muscles]),
            ]),
            h("div",{className:"badges"},[
              h("span",{className:"badge badge-eq"},[ex.eq]),
              h("span",{className:"badge badge-rest"},["Rest "+ex.rest]),
            ])
          )
        ),
        h("div",{className:"ex-sets-label"},[ex.sets])
      ),
      // Actions
      h("div",{className:"action-links"},
        h("button",{className:"action-link",onClick:()=>tg(k)},[guideOpen?"Hide guide ↑":"How to do it ↓"]),
        h("button",{className:"action-link"+(history.length>0?" log-link-active":""),onClick:()=>tl(k,ex)},
          [logOpen?"Hide log ↑":"Log sets"+(history.length>0?" ("+history.length+")":"")+" ↓"]),
        h("button",{className:"action-link timer-link",onClick:()=>setTimer({seconds:ex.restSecs})},["⏱ "+ex.rest]),
      ),
      // Guide
      guideOpen&&h("div",{className:"guide-box"},
        ex.guide.map((step,si)=>h("div",{className:"guide-step"},
          h("span",{className:"guide-num"},[(si+1)+"."]),
          h("span",{},[step])
        ))
      ),
      // Log
      logOpen&&h("div",{className:"log-section"},
        h("div",{className:"set-count-row"},
          h("span",{className:"set-count-label"},["Sets"]),
          h("button",{className:"count-btn",onClick:()=>csc(k,-1,ex)},["−"]),
          h("span",{className:"count-val"},[String(d.sets.length)]),
          h("button",{className:"count-btn",onClick:()=>csc(k,1,ex)},["+"])
        ),
        h("div",{className:"set-headers"},
          h("div",{className:"set-header-cell"},[""]),
          h("div",{className:"set-header-cell"},["Weight (kg)"]),
          h("div",{className:"set-header-cell"},["Reps"])
        ),
        ...d.sets.map((s,si)=>h("div",{className:"set-row"},
          h("span",{className:"set-label"},["Set "+(si+1)]),
          h("input",{type:"text",inputmode:"decimal",placeholder:"—",value:s.weight,className:"set-input",onBlur:e=>uds(k,si,"weight",e.target.value)}),
          h("input",{type:"text",inputmode:"numeric",placeholder:"—",value:s.reps,className:"set-input",onBlur:e=>uds(k,si,"reps",e.target.value)})
        )),
        isEditing
          ?h("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
              h("button",{className:"btn-primary",style:{background:wc.bg,color:wc.text,borderColor:wc.border,marginTop:10},onClick:()=>saveEdit(k,editIdx)},["Update session"]),
              h("button",{className:"btn-secondary",onClick:()=>cancelEdit(k,ex)},["Cancel"])
            )
          :h("button",{className:"btn-primary",style:{background:wc.bg,color:wc.text,borderColor:wc.border},onClick:()=>submit(k,ex.restSecs)},["Save & start rest timer"]),
        // Exercise-level notes
        h("div",{style:{marginTop:10}},
          h("div",{style:{fontSize:11,color:"#bbb",fontWeight:500,marginBottom:5}},["Exercise notes"]),
          h("textarea",{
            placeholder:"e.g. felt strong, grip slipping, increase weight next time...",
            onBlur:e=>setDraft(p=>({...p,[k]:{...(p[k]||{}),notes:e.target.value}})),
            style:{width:"100%",fontSize:13,padding:"8px 10px",border:"1px solid #e0e0e0",borderRadius:10,outline:"none",background:"#fafafa",color:"#111",resize:"none",minHeight:60,fontFamily:"inherit",lineHeight:1.5}
          })
        ),
        history.length>0&&h("div",{className:"history-section"},
          h("div",{className:"history-title"},["Previous sessions"]),
          ...history.map((session,hi)=>h("div",{className:"history-card"},
            h("div",{className:"history-card-hdr"},
              h("span",{className:"history-date"},[session.date]),
              h("button",{className:"history-edit",onClick:()=>startEdit(k,hi,session)},["Edit"])
            ),
            ...session.sets.map((s,si)=>h("div",{className:"history-set"},
              h("span",{className:"history-set-label"},["Set "+(si+1)]),
              s.weight&&h("span",{},[s.weight+" kg"]),
              s.reps&&h("span",{},[s.reps+" reps"]),
              !s.weight&&!s.reps&&h("span",{style:{color:"#ccc"}},["—"])
            )),
            session.notes&&h("div",{style:{fontSize:12,color:"#aaa",fontStyle:"italic",marginTop:4,paddingTop:4,borderTop:"1px solid #f0f0f0"}},["📝 "+session.notes])
          ))
        )
      )
    );
  }

  return h("div",{},
    timer&&Timer({seconds:timer.seconds,onClose:()=>setTimer(null)}),
    // Selectors
    h("div",{className:"selectors"},
      h("div",{className:"week-bar"},
        h("button",{className:"week-btn"+(week==="A"?" active-a":""),onClick:()=>setWeek("A")},["Week A"]),
        h("button",{className:"week-btn"+(week==="B"?" active-b":""),onClick:()=>setWeek("B")},["Week B"])
      ),
      h("div",{className:"day-bar"},
        DAYS.map((d,i)=>h("button",{className:"day-btn"+(dayIdx===i?" active":""),onClick:()=>{setDayIdx(i);setWarmupOpen(false);}},[ d.label]))
      )
    ),
    // Main card
    h("div",{className:"card"},
      h("div",{className:"card-title"},
        h("span",{className:"card-title-text"},[day.title]),
        h("span",{className:"card-subtitle"},["~45 min · Week "+week])
      ),
      h("div",{className:"tip-bar",style:{color:"#854F0B",background:"#FAEEDA"}},[day.tip]),
      // Warmup
      h("button",{className:"warmup-toggle",onClick:()=>setWarmupOpen(p=>!p)},
        h("span",{className:"warmup-title"},["🔥 5-min Warmup"]),
        h("span",{className:"warmup-arrow"},[warmupOpen?"Hide ↑":"Show ↓"])
      ),
      warmupOpen&&h("div",{className:"warmup-list"},
        warmup.exercises.map(w=>h("div",{className:"warmup-item"},
          h("div",{className:"warmup-item-hdr"},
            h("span",{className:"warmup-item-name"},[w.name]),
            h("span",{className:"warmup-item-dur"},[w.duration])
          ),
          h("div",{className:"warmup-item-cue"},[w.cue])
        ))
      ),
      // Floors
      ...plan.floors.map((floor,fi)=>h("div",{},
        h("div",{className:"floor-hdr"},[floor.name]),
        ...floor.exercises.map((ex,ei)=>exRow(ex,fi,ei))
      ))
    )
  );
}

mount(App,document.getElementById("root"));
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js"));
</script>
